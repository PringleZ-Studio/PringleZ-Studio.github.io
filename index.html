<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clothing Sorter Pro — Final Boss</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#010101;
  color:#fff;
  font-family:Inter;
  overflow-x:hidden;
}

h1,h2{font-family:Orbitron}

/* GLOBAL GLOW FIELD */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:radial-gradient(circle at 30% 30%,#8b5cf6 0%,transparent 40%),
             radial-gradient(circle at 70% 70%,#06b6d4 0%,transparent 40%),
             #010101;
  filter:blur(80px);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:clamp(4rem,10vw,8rem);
  background:linear-gradient(90deg,#8b5cf6,#06b6d4,#ec4899);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{color:#aaa;margin-top:20px}

.btn{
  margin-top:40px;
  padding:18px 40px;
  border-radius:20px;
  background:linear-gradient(90deg,#8b5cf6,#06b6d4);
  color:white;
  text-decoration:none;
  position:relative;
  overflow:hidden;
}

.btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle,rgba(255,255,255,.4),transparent 60%);
  opacity:0;
  transition:.3s;
}

.btn:active::after{opacity:1}

/* SORTER */
.sorter{
  padding:100px 20px;
  text-align:center;
}

.files{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin:40px 0;
}

.file{
  padding:10px 16px;
  border-radius:10px;
  background:#111;
}

.columns{
  display:flex;
  justify-content:center;
  gap:40px;
}

.col{
  width:220px;
  min-height:200px;
  border:2px dashed rgba(255,255,255,.1);
  border-radius:20px;
  padding:20px;
  transition:.3s;
}

.col.active{
  border-color:#8b5cf6;
  box-shadow:0 0 30px #8b5cf6;
}

/* FEATURES */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  padding:100px 20px;
}

.card{
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,.03);
  transition:.4s;
}

.card:hover{
  transform:translateY(-12px) scale(1.05);
  box-shadow:0 0 80px rgba(139,92,246,.4);
}

/* CURSOR */
.cursor{
  width:18px;height:18px;
  border:2px solid #8b5cf6;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  box-shadow:0 0 20px #8b5cf6;
}

</style>
</head>

<body>
<div class="bg"></div>
<div class="cursor" id="cursor"></div>

<section class="hero">
  <h1>CLOTHING SORTER PRO</h1>
  <p>Feels like software. Not a website.</p>
  <a href="#" class="btn">Download Free</a>
</section>

<section class="sorter">
  <h2>LIVE AI SORTING ENGINE</h2>
  <p id="status" style="color:#888;margin-top:10px">Idle...</p>

  <div class="files" id="files">
    <div class="file">mp_m_shirt_01.ydd</div>
    <div class="file">mp_f_pants_02.ydd</div>
    <div class="file">mp_m_shoes_03.ytd</div>
  </div>

  <button class="btn" id="start">Start Sorting</button>

  <div class="columns" style="margin-top:40px">
    <div class="col" id="male"><h4>Male</h4></div>
    <div class="col" id="female"><h4>Female</h4></div>
  </div>
</section>

<section class="cards">
  <div class="card">⚡ Instant Sorting</div>
  <div class="card">🧠 AI Detection</div>
  <div class="card">🚀 Resource Builder</div>
</section>

<script>
// CURSOR
const cursor=document.getElementById("cursor")
document.addEventListener("mousemove",e=>{
 cursor.style.left=e.clientX+"px"
 cursor.style.top=e.clientY+"px"
})

// HERO ANIM
gsap.from("h1",{y:80,opacity:0,duration:1})

// SORT ENGINE
const btn=document.getElementById("start")
const files=document.querySelectorAll(".file")
const status=document.getElementById("status")

btn.onclick=()=>{
 status.innerText="Scanning files..."

 setTimeout(()=>status.innerText="Detecting types...",800)
 setTimeout(()=>status.innerText="Sorting assets...",1600)

 files.forEach((file,i)=>{
  setTimeout(()=>{
    const target=file.innerText.includes("mp_m")
      ? document.getElementById("male")
      : document.getElementById("female")

    target.classList.add("active")

    gsap.to(file,{
      x:target.getBoundingClientRect().left - file.getBoundingClientRect().left,
      y:target.getBoundingClientRect().top - file.getBoundingClientRect().top,
      duration:.6
    })

    setTimeout(()=>{
      target.appendChild(file)
      file.style.transform="none"
      target.classList.remove("active")
    },600)

  },i*800)
 })

 setTimeout(()=>status.innerText="✔ Completed",3000)
}
</script>

</body>
</html>
